<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>辰光英雄傳 - 品格實驗室</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #fdfaf1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-box { background: white; border: 3px solid #8b0000; border-radius: 20px; width: 600px; padding: 40px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #8b0000; font-size: 48px; margin-bottom: 10px; }
        .line { width: 100%; height: 3px; background-color: #ffcc00; margin-bottom: 30px; }
        p { font-size: 20px; line-height: 1.6; color: #333; margin-bottom: 40px; }
        .btn { background-color: #8b0000; color: white; border: none; padding: 15px 80px; font-size: 24px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #a00000; transform: scale(1.05); }
        .hidden { display: none; }
        .character-img { max-width: 250px; border-radius: 10px; margin-bottom: 20px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; background: #fff; }
        .choice-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>辰光英雄傳</h1>
        <div class="line"></div>
        <p>歡迎來到辰光國小品格實驗室！<br><br>我們正尋找具備「責任、正義、感恩」特質的英雄。請通過三位歷史人物的考驗，修復校園的能量場！</p>
        <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="game-content" class="hidden">
        <h2 id="stage-title">第一關：池府王爺的考驗</h2>
        <img id="stage-img" src="" class="character-img">
        <p id="question-text">題目載入中...</p>
        <div id="choices"></div>
    </div>
</div>

<script>
    const stages = [
        {
            title: "第一關：池府王爺的【責任】",
            img: "https://raw.githubusercontent.com/username/repo/main/chi_fu.jpg", // 註：此處需更換為您的圖片路徑
            question: "如果你發現同學在走廊奔跑快要撞到人了，你會怎麼做？",
            choices: [
                { text: "主動出聲提醒同學注意安全", correct: true, feedback: "正確！主動提醒是責任感的表現！" },
                { text: "裝作沒看見，反正不是我撞的", correct: false, feedback: "不對喔，池王爺會希望你守護大家的安全。" }
            ]
        },
        {
            title: "第二關：廖添丁的【正義】",
            img: "https://raw.githubusercontent.com/username/repo/main/liao_tian_ding.jpg",
            question: "看到同學被冷落，你會怎麼做？",
            choices: [
                { text: "安慰被冷落的同學，並邀他一起玩", correct: true, feedback: "太棒了！像廖添丁一樣保護弱小同學！" },
                { text: "怕惹麻煩所以不理會", correct: false, feedback: "廖添丁會希望你勇敢一點，用對的方法站出來。" }
            ]
        },
        {
            title: "第三關：廣澤尊王的【感恩】",
            img: "https://raw.githubusercontent.com/username/repo/main/guang_ze.jpg",
            question: "老師幫大家爭取到戶外教學，你會？",
            choices: [
                { text: "寫一張小卡片謝謝老師的辛苦", correct: true, feedback: "這就是廣澤尊王教導我們的孝與義！" },
                { text: "覺得是應該的，沒什麼好謝的", correct: false, feedback: "凡事感恩能讓你獲得更多正能量喔。" }
            ]
        }
    ];

    let currentStage = 0;

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-content').classList.remove('hidden');
        showStage();
    }

    function showStage() {
        const stage = stages[currentStage];
        document.getElementById('stage-title').innerText = stage.title;
        // 這裡暫時顯示您上傳的意象
        document.getElementById('question-text').innerText = stage.question;
        
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        stage.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = () => {
                alert(choice.feedback);
                if(choice.correct) {
                    currentStage++;
                    if(currentStage < stages.length) {
                        showStage();
                    } else {
                        finishGame();
                    }
                }
            };
            choicesDiv.appendChild(btn);
        });
    }

    function finishGame() {
        document.getElementById('game-content').innerHTML = `
            <h1>挑戰成功！</h1>
            <p>你已獲得「辰光品格英雄」稱號！<br>責任、正義、感恩的能量已修復校園。</p>
            <button class="btn" onclick="location.reload()">重新挑戰</button>
        `;
    }
</script>

</body>
</html>
