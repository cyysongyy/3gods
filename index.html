<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辰光英雄傳 - 品格守護者</title>
    <style>
        :root { --primary: #8b0000; --accent: #d4a017; --bg: #fdfaf1; --text: #4a4a4a; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { background: #ffffff; width: 95%; max-width: 650px; padding: 35px; border: 8px solid #f0e6d2; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); text-align: center; position: relative; }
        h1 { color: var(--primary); font-size: 2.5em; margin: 0; letter-spacing: 3px; }
        .line { width: 120px; height: 4px; background: var(--accent); margin: 10px auto 25px; border-radius: 2px; }
        .screen { display: none; animation: slideUp 0.5s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .img-box { width: 100%; height: 300px; background: #fafafa; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; border: 1px solid #eee; overflow: hidden; }
        .img-box img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .question-meta { color: var(--accent); font-weight: bold; margin-bottom: 8px; font-size: 1.1em; }
        .question-text { font-size: 1.3em; color: var(--text); margin-bottom: 25px; line-height: 1.5; min-height: 3.2em; display: flex; align-items: center; justify-content: center; padding: 0 10px; }
        .btn-list { display: grid; gap: 15px; padding: 0 10px; }
        button { padding: 18px 25px; font-size: 1.15em; cursor: pointer; border: 2px solid #eee; border-radius: 50px; background: white; transition: all 0.3s; color: var(--text); font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button:hover { transform: translateY(-3px); background: #fff9e6; border-color: var(--accent); color: var(--primary); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .next-btn { background: var(--primary) !important; color: white !important; border: none; margin-top: 25px; width: 100%; font-size: 1.2em; border-radius: 15px; justify-content: center; }
        .feedback { margin-top: 15px; padding: 18px; border-radius: 15px; display: none; font-size: 1.05em; line-height: 1.5; }
        .correct { background: #f0f9eb; color: #67c23a; border: 1px solid #e1f3d8; }
        .wrong { background: #fef0f0; color: #f56c6c; border: 1px solid #fde2e2; }
        .progress-bar { font-size: 0.9em; color: #888; margin-top: 20px; background: #eee; border-radius: 10px; padding: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="s0" class="screen active">
        <h1>辰光英雄傳</h1>
        <div class="line"></div>
        <p style="font-size: 1.2em; line-height: 1.7;">守護英雄請注意：<br>在進入品格試煉前，<br>請先完成<b>「英雄點名」</b>配對挑戰！</p>
        <button class="next-btn" onclick="startMatching()">⚔️ 開始點名</button>
    </div>

    <div id="matching-screen" class="screen">
        <div class="question-meta">【前傳：英雄點名】</div>
        <div class="img-box"><img id="match-img" src=""></div>
        <div class="question-text">請問這尊守護神的名字是？</div>
        <div id="match-choices" class="btn-list"></div>
        <div id="match-feedback" class="feedback"></div>
        <button id="btn-to-main" class="next-btn" style="display:none" onclick="startChallenge()">✨ 通過！進入試煉</button>
    </div>

    <div id="game-play" class="screen">
        <div class="question-meta" id="stage-info"></div>
        <div class="img-box"><img id="stage-img" src=""></div>
        <div class="question-text" id="q-text"></div>
        <div id="choice-list" class="btn-list"></div>
        <div id="fb-box" class="feedback"></div>
        <button id="btn-continue" class="next-btn" style="display:none" onclick="handleFlow()">🐾 繼續挑戰</button>
        <div class="progress-bar" id="prog-text"></div>
    </div>

    <div id="s-end" class="screen">
        <h2 style="color:var(--primary); font-size: 2.3em;">試煉達成！🏆</h2>
        <div class="line"></div>
        <p style="font-size: 1.2em;">恭喜你通過了點名與 6 項品格測試，<br>辰光國小的正能量已全數回歸！</p>
        <div style="font-size: 4em; margin: 15px 0;">✨🛡️🏫</div>
        <button class="next-btn" onclick="location.reload()">🔄 再練一次</button>
    </div>
</div>

<script>
    const heroes = [
        { name: "池府王爺", img: "tzu.jfif", trait: "責任" },

    const allPools = {

            { q: "發現大家討論沒進度，你會？", a: "🗣️ 主動分配工作", b: "🤐 反正不理我也不管", fb: "領袖的責任是帶動大家前進。" },
            { q: "看到同學沒關水龍頭，你會？", a: "💧 主動幫忙關緊", b: "🙄 水費不是我出的", fb: "惜水如金是愛護地球的責任。" },
            { q: "答應借書卻忘了帶，你會？", a: "🤝 誠心道歉改天補", b: "🙈 假裝沒這回事", fb: "誠信是負責任的重要一環。" },
            { q: "打掃區域沒人檢查時？", a: "✨ 依然打掃乾淨", b: "🍂 隨便揮兩下", fb: "對自己負責，不需要別人監督。" },
            { q: "看到地上有落葉，你會？", a: "🍂 順手撿起丟掉", b: "🚶‍♂️ 這是別人的事", fb: "校園美化，人人有責。" },
            { q: "老師交辦傳話工作？", a: "📢 準確傳達到位", b: "🐢 過了好久才說", fb: "完成任務展現可靠責任感。" },
            { q: "學弟妹推擠受傷時？", a: "🚑 協助送醫護室", b: "👣 直接繞道走", fb: "大幫小是我們的責任。" },
            { q: "發現窗戶沒鎖，你會？", a: "🔒 折返回去鎖好", b: "🌙 警衛等一下會鎖", fb: "細心負責能保護校園安全。" },
            { q: "午餐剩下飯菜，你會？", a: "🍱 盡力吃完不浪費", b: "🗑️ 全部倒掉", fb: "不浪費是基本責任。" },
            { q: "弄倒了花瓶，你會？", a: "😟 主動報告並整理", b: "🏃‍♀️ 趁沒人看快跑", fb: "勇於承擔意外的結果。" },
            { q: "集體活動遲到了？", a: "⏰ 反省下次準時", b: "🤷‍♂️ 怪時鐘壞了", fb: "守時是尊重他人的責任。" },
            { q: "領到通知單，你會？", a: "📝 回家交給家長", b: "🗑️ 塞在書包底", fb: "訊息傳遞是學生的職責。" },
            { q: "看見破壞公物，你會？", a: "✋ 溫柔制止或報告", b: "🔨 一起加入破壞", fb: "保護學校資產是大家的責任。" },
            { q: "作業很難，你會？", a: "🤔 努力思考請教", b: "📝 直接抄別人的", fb: "學習是學生對自己負責。" },
            { q: "整潔比賽輸了，你會？", a: "🧐 找出缺點改進", b: "😤 覺得裁判不公", fb: "檢討與改進是成熟負責。" },
            { q: "發現同學文具掉了？", a: "✏️ 幫忙撿起來", b: "🙈 裝作沒看見", fb: "互助共好是校園生活責任。" },
            { q: "分到辛苦的工作？", a: "💪 當成鍛鍊機會", b: "😢 跟老師抱怨", fb: "難事我扛，就是英雄氣概。" },
            { q: "代表班級參賽，你會？", a: "🏆 全力以赴爭光", b: "🎈 隨便玩玩", fb: "不辜負大家的期待。" },
            { q: "聯絡簿忘了簽名？", a: "🖋️ 提醒家長簽名", b: "🤫 明天自己簽", fb: "落實規定是負責的起點。" }
        ],
        "廖添丁": [
            { q: "有人威脅不准跟誰玩？", a: "🙅‍♂️ 勇敢說不", b: "🤐 聽他的話不理人", fb: "正義就是拒絕霸凌。" },
            { q: "裁判誤判你得分，你會？", a: "⚖️ 誠實修正分數", b: "😈 暗自高興繼續", fb: "誠實的公平才是真勝利。" },
            { q: "同學被造謠排擠，你會？", a: "🛡️ 主動幫忙澄清", b: "👂 覺得好玩跟著傳", fb: "流言止於智者，正義守護清白。" },
            { q: "分組剩下一位同學？", a: "🤝 邀請他加入", b: "👀 假裝沒看見", fb: "不遺漏任何一人是慈悲。" },
            { q: "有人打破玻璃賴給人？", a: "📢 勇敢說出實話", b: "🤐 怕得罪人不敢說", fb: "正義需要說真話的勇氣。" },
            { q: "看到同學在插隊，你會？", a: "🚶‍♂️ 請他遵守規矩", b: "🏃‍♂️ 我也跟著插隊", fb: "守護秩序是維護公平。" },
            { q: "發現學弟被勒索，你會？", a: "📞 立刻告知老師", b: "🫣 害怕地躲起來", fb: "正義是運用智慧保護弱小。" },
            { q: "背後說老師壞話，你會？", a: "🤫 不參與並保持尊重", b: "🗣️ 一起吐槽老師", fb: "不語人是非也是正義。" },
            { q: "看到不屬於他的東西？", a: "📦 提醒物歸原主", b: "😈 也想拿一份", fb: "正義不貪小便宜。" },
            { q: "好友作弊，你會？", a: "💡 課後真誠勸導", b: "🙈 幫他遮掩視線", fb: "真朋友不看著對方墮落。" },
            { q: "玩桌遊有人鑽漏洞？", a: "🧐 提議重新檢視", b: "😈 跟著鑽漏洞", fb: "守法與守規是英雄本色。" },
            { q: "有人家境被嘲笑？", a: "💖 制止並肯定優點", b: "😏 在一旁偷笑", fb: "人格尊嚴高於物質財富。" },
            { q: "有人欺負流浪狗？", a: "🐕 上前制止或救援", b: "🧱 一起拿石頭丟", fb: "對弱小生命的尊重是正義。" },
            { q: "考卷加錯分了，你會？", a: "💯 主動找老師更正", b: "🤫 叫他不要說", fb: "公平比分數更重要。" },
            { q: "班會有人被喝斥？", a: "✋ 請冷靜聽他說完", b: "🗣️ 幫著大聲喝斥", fb: "守護發言權是民主正義。" },
            { q: "同學在廁所玩火？", a: "⚠️ 立刻通報維護安全", b: "👀 覺得酷一起看", fb: "正義有時是及時的通報。" },
            { q: "領獎品多拿了，你會？", a: "🎁 退回讓大家都有", b: "😒 抱怨拿太少", fb: "資源公正是正義體現。" },
            { q: "同學動作慢被嫌？", a: "🐢 耐心等候並協助", b: "😠 催促並責罵他", fb: "包容也是一種溫柔正義。" },
            { q: "校牆被亂噴漆？", a: "🏢 通報學校處理", b: "🎨 覺得是藝術", fb: "愛護公務，不容忍破壞。" },
            { q: "有人約去危險地方玩？", a: "🛑 堅定拒絕並勸阻", b: "😰 怕被笑膽小", fb: "保護生命就是正義。" }
        ],
        "廣澤尊王": [
            { q: "吃完飯看見廚工辛苦？", a: "🥣 感激並收好盤子", b: "🙄 覺得那是工作", fb: "感恩每一份默默的辛勞。" },
            { q: "收到同學手作卡片？", a: "💌 開心道謝並珍藏", b: "🗑️ 隨手丟在抽屜", fb: "感恩他人的用心。" },
            { q: "清潔人員在掃地，你會？", a: "🙇‍♂️ 點頭致意說辛苦了", b: "🏃‍♂️ 趕快跑開怕弄髒", fb: "感恩是看見別人的不容易。" },
            { q: "家長來接你放學，你會？", a: "🚗 主動說謝謝來接我", b: "😠 抱怨遲到", fb: "家人的愛並非理所當然。" },
            { q: "接受幫助後，你會？", a: "🔄 找機會回報對方", b: "🚶‍♂️ 受人點滴後即忘", fb: "感恩是善的循環。" },
            { q: "看到校園花草，你會？", a: "🌻 感謝自然並愛護", b: "👟 隨意踐踏", fb: "對自然的感恩滋養心靈。" },
            { q: "老師寫鼓勵的話，你會？", a: "📖 心懷感激讀完", b: "📕 看都不看就蓋上", fb: "感恩願意為你付出的人。" },
            { q: "同學教你數學題？", a: "🙏 真誠道謝", b: "😏 覺得他在炫耀", fb: "感恩知識分享，自己更進步。" },
            { q: "今天平安度過，你會？", a: "💖 感謝珍惜這一天", b: "🥱 覺得好無聊", fb: "平安就是福，常懷感恩心。" },
            { q: "挫折有人陪伴，你會？", a: "🤗 感謝陪伴的力量", b: "😠 把氣出在對方", fb: "感恩患難中的陪伴。" },
            { q: "警衛幫忙開門，你會？", a: "👮‍♂️ 微笑問好道謝", b: "🚶‍♂️ 理直氣壯走入", fb: "感恩守護校園的小角落。" },
            { q: "穿著乾淨的制服？", a: "👕 感謝家人洗衣", b: "🤮 覺得制服醜", fb: "生活瑣碎處處有愛。" },
            { q: "外教学玩得開心？", a: "🚌 寫文感謝主辦方", b: "😒 抱怨車子舊", fb: "感恩背後的行政籌備。" },
            { q: "校護幫你擦藥，你會？", a: "👩‍⚕️ 說謝謝幫我止痛", b: "😭 哭鬧嫌藥水痛", fb: "感恩醫療人員的專業。" },
            { q: "這學期有進步？", a: "📈 感謝師生支持", b: "🧠 覺得全靠自己", fb: "成功背後必有眾人扶持。" },
            { q: "拿到新教科書？", a: "📘 感謝知識的恩賜", b: "🎨 在上面亂畫", fb: "珍惜知識才會有力量。" },
            { q: "義工講故事給你聽？", a: "🧙‍♀️ 專心聽並回應", b: "🗣️ 在下面聊天", fb: "感恩別人的時間與愛心。" },
            { q: "看見太陽升起？", a: "🌅 感受恩賜與希望", b: "😪 抱怨又要上學", fb: "感恩每天是新的開始。" },
            { q: "收到不合穿的衣服？", a: "🎁 感謝對方的好意", b: "😒 當面嫌棄大小", fb: "感恩心意，而非物品。" },
            { q: "讀到感人文章？", a: "🔖 感謝作者的勇氣", b: "🌬️ 隨手翻過", fb: "感恩文字帶來的共鳴。" }
        ]
    };

    let gameStages = [];
    let currentStageIdx = 0, currentSubIdx = 0, matchHero;

    function startMatching() {
        document.getElementById('s0').classList.remove('active');
        document.getElementById('matching-screen').classList.add('active');
        matchHero = heroes[Math.floor(Math.random() * 3)];
        document.getElementById('match-img').src = matchHero.img;
        const list = document.getElementById('match-choices');
        list.innerHTML = '';
        list.style.pointerEvents = 'auto';
        document.getElementById('match-feedback').style.display = 'none';
        heroes.forEach(h => {
            const b = document.createElement('button');
            b.innerText = h.name;
            b.onclick = () => {
                const mfb = document.getElementById('match-feedback');
                mfb.style.display = 'block';
                if(h.name === matchHero.name) {
                    mfb.innerText = `⭕ 正確！祂就是掌管「${matchHero.trait}」的守護神。`;
                    mfb.className = 'feedback correct';
                    document.getElementById('btn-to-main').style.display = 'block';
                    list.style.pointerEvents = 'none';
                } else {
                    mfb.innerText = "❌ 答錯囉，再仔細看看神像！";
                    mfb.className = 'feedback wrong';
                }
            };
            list.appendChild(b);
        });
    }

    function startChallenge() {
        gameStages = heroes.map(h => {
            let shuffled = [...allPools[h.name]].sort(() => 0.5 - Math.random());
            return { name: h.name, img: h.img, trait: h.trait, questions: shuffled.slice(0, 2) };
        });
        currentStageIdx = 0; currentSubIdx = 0;
        document.getElementById('matching-screen').classList.remove('active');
        document.getElementById('game-play').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        const stage = gameStages[currentStageIdx];
        const qData = stage.questions[currentSubIdx];
        document.getElementById('stage-info').innerText = `【${stage.trait}之試煉】${stage.name}`;
        document.getElementById('stage-img').src = stage.img;
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('fb-box').style.display = 'none';
        document.getElementById('btn-continue').style.display = 'none';
        let currentQ = (currentStageIdx * 2) + currentSubIdx + 1;
        document.getElementById('prog-text').innerText = `品格修復進度：${currentQ} / 6`;
        const list = document.getElementById('choice-list');
        list.innerHTML = '';
        list.style.pointerEvents = 'auto';
        const ops = [{ text: qData.a, correct: true }, { text: qData.b, correct: false }].sort(() => Math.random() - 0.5);
        ops.forEach(op => {
            const b = document.createElement('button');
            b.innerText = op.text;
            b.onclick = () => {
                const fb = document.getElementById('fb-box');
                fb.style.display = 'block';
                fb.innerText = qData.fb;
                fb.className = 'feedback ' + (op.correct ? 'correct' : 'wrong');
                if(op.correct) {
                    document.getElementById('btn-continue').style.display = 'block';
                    list.style.pointerEvents = 'none';
                }
            };
            list.appendChild(b);
        });
    }

    function handleFlow() {
        currentSubIdx++;
        if(currentSubIdx >= 2) { currentSubIdx = 0; currentStageIdx++; }
        if(currentStageIdx < gameStages.length) loadQuestion();
        else {
            document.getElementById('game-play').classList.remove('active');
            document.getElementById('s-end').classList.add('active');
        }
    }
</script>
</body>
</html>
