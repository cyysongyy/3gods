 <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辰光英雄傳 - 品格守護者</title>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
    <style>
        :root { --primary: #ff3333; --gold: #ffd700; --bg-dark: #050509; --text-light: #ffffff; }
        
        /* 1. 動態星空背景 */
        body { 
            background: var(--bg-dark);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 20px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starsMove 60s linear infinite;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
        }
        @keyframes starsMove { from { background-position: 0 0, 40px 60px, 130px 270px; } to { background-position: 550px 1100px, 440px 660px, 630px 770px; } }

        /* 2. 霓虹流光邊框容器 */
        #game-container { 
            background: rgba(20, 20, 30, 0.95); width: 95%; max-width: 650px; padding: 40px; 
            border-radius: 20px; text-align: center; position: relative; color: var(--text-light);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            overflow: hidden;
            border: 2px solid transparent;
            border-image: linear-gradient(60deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            border-image-slice: 1;
            animation: borderGlow 4s linear infinite;
        }
        @keyframes borderGlow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        h1 { color: var(--text-light); font-size: 3em; margin: 0; letter-spacing: 5px; text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); animation: titlePulse 2s infinite; }
        @keyframes titlePulse { 0%, 100% { transform: scale(1); text-shadow: 0 0 10px var(--primary); } 50% { transform: scale(1.05); text-shadow: 0 0 20px var(--primary), 0 0 30px #ff7f7f; } }
        
        .line { width: 150px; height: 4px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 15px auto 30px; border-radius: 2px; box-shadow: 0 0 10px var(--gold); }
        
        .screen { display: none; animation: slideIn 0.5s ease-out; }
        .active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* 圖片區增加魔法陣光圈 */
        .img-box { 
            width: 100%; height: 320px; background: rgba(255,255,255,0.05); border-radius: 20px; 
            margin-bottom: 25px; display: flex; justify-content: center; align-items: center; 
            position: relative; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .img-box::after {
            content: ""; position: absolute; width: 200px; height: 200px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 L95 50 L50 95 L5 50 Z" fill="none" stroke="%23ffd700" stroke-width="0.5" opacity="0.3"/></svg>');
            background-size: cover; animation: magicRotate 10s linear infinite; opacity: 0.5; z-index: 0;
        }
        @keyframes magicRotate { from { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } to { transform: rotate(360deg) scale(1); } }
        .img-box img { max-width: 90%; max-height: 90%; border-radius: 10px; z-index: 1; position: relative; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }

        .question-meta { color: var(--gold); font-weight: bold; margin-bottom: 10px; font-size: 1.2em; text-shadow: 0 0 5px var(--gold); }
        .question-text { font-size: 1.4em; color: var(--text-light); margin-bottom: 30px; line-height: 1.5; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        /* 3. 3D 立體酷炫按鈕 */
        .btn-list { display: grid; gap: 15px; }
        button { 
            padding: 18px 25px; font-size: 1.15em; cursor: pointer; 
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50px; 
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a); 
            color: var(--text-light); transition: 0.3s; font-weight: bold;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3), -2px -2px 5px rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }
        button::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: 0.5s; }
        button:hover { 
            transform: translateY(-3px) scale(1.02); 
            border-color: var(--gold); color: var(--gold); 
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }
        button:hover::before { left: 100%; }

        .next-btn { 
            background: linear-gradient(145deg, #ff4d4d, #b30000) !important; 
            color: white !important; border: none; margin-top: 25px; width: 100%; font-size: 1.3em; 
            box-shadow: 0 5px 15px rgba(255,0,0,0.4); text-shadow: 0 2px 2px rgba(0,0,0,0.5);
        }
        .next-btn:hover { box-shadow: 0 0 25px rgba(255,0,0,0.7); border-color: transparent; color: white; }

        .feedback { margin-top: 20px; padding: 20px; border-radius: 15px; display: none; font-size: 1.1em; line-height: 1.6; backdrop-filter: blur(5px); }
        .correct { background: rgba(103, 194, 58, 0.15); color: #85ff85; border: 1px solid #67c23a; box-shadow: 0 0 15px rgba(103, 194, 58, 0.5); }
        .wrong { background: rgba(245, 108, 108, 0.15); color: #ff8585; border: 1px solid #f5c6c2; box-shadow: 0 0 15px rgba(245, 108, 108, 0.5); }
        .progress { font-size: 0.9em; color: #aaa; margin-top: 20px; text-shadow: 0 0 2px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="s0" class="screen active">
        <h1>辰光英雄傳</h1>
        <div class="line"></div>
        <p style="font-size: 1.25em; line-height: 1.8; color: rgba(255,255,255,0.8);">
            勇敢的辰光小英雄，歡迎你！<br>校園的守護能量變弱了，<br>請運用你的<b>責任、正義與感恩</b>，<br>通過神明們的試煉，找回光芒吧！
        </p>
        <button class="next-btn" onclick="go(1)">⚡ 踏上征途</button>
    </div>

    <div id="game-play" class="screen">
        <div class="question-meta" id="stage-info"></div>
        <div class="img-box"><img id="stage-img" src="" alt="關卡人物"></div>
        <div class="question-text" id="q-text"></div>
        <div class="btn-list" id="choice-list"></div>
        <div id="fb-box" class="feedback"></div>
        <button id="btn-continue" class="next-btn" style="display:none" onclick="nextQuestion()">🔮 繼續前進</button>
        <div class="progress" id="prog-text"></div>
    </div>

    <div id="s-end" class="screen">
        <h1 style="color:var(--gold); font-size: 3.5em;">使命必達！</h1>
        <div class="line"></div>
        <p style="font-size: 1.3em;">恭喜你通過了重重考驗，<br>你內心的品格光芒已經修復了校園！</p>
        <div style="font-size: 6em; margin: 20px 0; filter: drop-shadow(0 0 20px var(--gold));">💎</div>
        <button class="next-btn" onclick="location.reload()">🔄 再次修煉</button>
    </div>
</div>

<script>
    // 檔名路徑已根據截圖修正為英文檔名
    const allData = {
        responsibility: {
            name: "池府王爺", img: "tzu.jfif", trait: "責任",
            pool: [
                { q: "看到地上有垃圾，但不是你丟的，你會？", a: "🧹 主動撿起來丟掉", b: "🚶‍♂️ 不關我的事走過去", fb: "責任就是：看見需要，主動承擔！" },
                { q: "答應老師要準時交作業，卻忘了帶，你會？", a: "🤝 誠實認錯並補交", b: "🤷‍♂️ 騙老師說媽媽忘記放", fb: "勇於面對錯誤也是一種負責任喔！" }
                // ... (此處可自行補齊原本的 20 題庫)
            ]
        },
        justice: {
            name: "廖添丁", img: "liu.jpg", trait: "正義",
            pool: [
                { q: "看到強壯的同學在欺負弱小，你會？", a: "🛡️ 找老師或大人幫忙", b: "😈 加入強的一方", fb: "正義不是暴力，是保護需要幫助的人。" },
                { q: "好朋友叫你一起作弊，你會？", a: "✋ 婉拒並勸他好好讀書", b: "🤝 為了義氣幫他", fb: "真正的義氣是帶領朋友走正確的路。" }
                // ... (此處可自行補齊原本的 20 題庫)
            ]
        },
        gratitude: {
            name: "廣澤尊王", img: "kuan.jpg", trait: "感恩",
            pool: [
                { q: "吃完午餐後，你會對廚工阿姨？", a: "🥣 大聲說謝謝阿姨", b: "🙄 直接把餐具放著就走", fb: "感恩每一餐背後的辛勞付出。" },
                { q: "爸爸媽媽辛苦工作回來，你會？", a: "💖 幫忙拿拖鞋或遞杯水", b: "📱 吵著要玩手機", fb: "百善孝為先，感恩從家人開始。" }
                // ... (此處可自行補齊原本的 20 題庫)
            ]
        }
    };

    let gameStages = [];
    let currentIdx = 0;

    // 答對時的粒子煙火特效
    function祝賀粒子() {
        const defaults = { spread: 360, ticks: 50, gravity: 0, decay: 0.94, startVelocity: 30, shapes: ['star'], colors: ['FFE74C', 'FF5964', 'FFFFFF', '6BF178', '35A7FF'] };
        confetti({ ...defaults, particleCount: 40, scalar: 1.2 });
        confetti({ ...defaults, particleCount: 10, scalar: 0.75 });
    }

    function go(s) {
        if (s === 1) {
            // 隨機從每個品格池抽 2 題，總共 6 題
            gameStages = [
                {...allData.responsibility, item: allData.responsibility.pool.sort(()=>0.5-Math.random()).slice(0,2)},
                {...allData.justice, item: allData.justice.pool.sort(()=>0.5-Math.random()).slice(0,2)},
                {...allData.gratitude, item: allData.gratitude.pool.sort(()=>0.5-Math.random()).slice(0,2)}
            ].flatMap(stage => stage.item.map(q => ({...stage, item: q}))); // 展開題目

            document.getElementById('s0').classList.remove('active');
            document.getElementById('game-play').classList.add('active');
            currentIdx = 0;
            loadQuestion();
        }
    }

    function loadQuestion() {
        const data = gameStages[currentIdx];
        document.getElementById('stage-info').innerText = `【${data.trait}之試煉】${data.name}`;
        document.getElementById('stage-img').src = data.img;
        document.getElementById('q-text').innerText = data.item.q;
        document.getElementById('fb-box').style.display = 'none';
        document.getElementById('btn-continue').style.display = 'none';
        document.getElementById('prog-text').innerText = `修復進度：${currentIdx + 1} / 6`;

        const list = document.getElementById('choice-list');
        list.innerHTML = '';
        list.style.pointerEvents = 'auto';

        const ops = [
            { text: data.item.a, correct: true },
            { text: data.item.b, correct: false }
        ].sort(() => Math.random() - 0.5);

        ops.forEach(op => {
            const b = document.createElement('button');
            b.innerText = op.text;
            b.onclick = () => {
                const fb = document.getElementById('fb-box');
                fb.style.display = 'block';
                fb.innerText = data.item.fb;
                fb.className = 'feedback ' + (op.correct ? 'correct' : 'wrong');
                if(op.correct) {
                    祝賀粒子(); // 觸發炫麗特效
                    document.getElementById('btn-continue').style.display = 'block';
                    list.style.pointerEvents = 'none';
                }
            };
            list.appendChild(b);
        });
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < gameStages.length) {
            loadQuestion();
        } else {
            document.getElementById('game-play').classList.remove('active');
            document.getElementById('s-end').classList.add('active');
            // 結束時噴發大煙火
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
        }
    }
</script>
</body>
</html>
